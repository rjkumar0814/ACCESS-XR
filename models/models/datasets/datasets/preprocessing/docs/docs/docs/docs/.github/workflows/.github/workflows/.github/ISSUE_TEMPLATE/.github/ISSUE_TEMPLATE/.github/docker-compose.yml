version: "3.9"

services:

  backend:

    container_name: access-xr-backend

    build:
      context: .
      dockerfile: Dockerfile

    image: access-xr:1.0

    restart: unless-stopped

    ports:
      - "8000:8000"

    environment:
      PYTHONUNBUFFERED: "1"
      LOG_LEVEL: INFO
      MODEL_PATH: /app/models

    volumes:
      - ./backend:/app/backend
      - ./models:/app/models
      - ./configs:/app/configs
      - ./logs:/app/logs

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    networks:
      - access-xr-network

  frontend:

    container_name: access-xr-frontend

    image: node:20

    restart: unless-stopped

    working_dir: /app

    command: >
      sh -c "
      npm install &&
      npm start
      "

    volumes:
      - ./:/app

    ports:
      - "3000:3000"

    depends_on:
      backend:
        condition: service_started

    environment:
      API_URL: http://backend:8000

    networks:
      - access-xr-network

networks:

  access-xr-network:
    driver: bridge

volumes:

  logs:
