# ==============================================================================
# ACCESS-XR Default Configuration
# ==============================================================================

project:
  name: ACCESS-XR
  version: 1.0.0
  description: Unified Multimodal Communication System for Inclusive and Accessible Extended Reality

# ==============================================================================
# Runtime
# ==============================================================================

runtime:
  device: auto          # auto | cpu | cuda
  seed: 42
  deterministic: true
  num_workers: 4

# ==============================================================================
# Logging
# ==============================================================================

logging:
  level: INFO
  save_logs: true
  log_directory: logs/
  log_filename: access_xr.log

# ==============================================================================
# API
# ==============================================================================

api:
  host: 0.0.0.0
  port: 8000
  workers: 1
  reload: false

# ==============================================================================
# Model Paths
# ==============================================================================

models:

  gesture:
    architecture: YOLOv8
    checkpoint: models/gesture_model.pt
    confidence_threshold: 0.50
    iou_threshold: 0.45

  speech:
    architecture: Whisper
    model_size: base
    language: auto

  fusion:
    architecture: SharedLatentFusion
    uncertainty_enabled: true
    confidence_threshold: 0.60

# ==============================================================================
# Dataset
# ==============================================================================

dataset:

  root: datasets/

  gesture:
    path: datasets/gesture/

  speech:
    path: datasets/speech/

  annotations:
    path: datasets/annotations/

# ==============================================================================
# Image Preprocessing
# ==============================================================================

preprocessing:

  image:
    width: 640
    height: 640
    normalize: true

  audio:
    sample_rate: 16000
    mono: true

# ==============================================================================
# Inference
# ==============================================================================

inference:

  batch_size: 1

  save_predictions: true

  output_directory: outputs/

  visualization: true

# ==============================================================================
# Fusion
# ==============================================================================

fusion:

  semantic_mapping: true

  uncertainty_estimation: true

  temporal_consistency: true

  confidence_weighting: adaptive

# ==============================================================================
# Evaluation
# ==============================================================================

evaluation:

  metrics:

    - accuracy

    - precision

    - recall

    - f1_score

    - latency

    - throughput

# ==============================================================================
# Deployment
# ==============================================================================

deployment:

  docker: true

  gpu: auto

  mixed_precision: false

# ==============================================================================
# Security
# ==============================================================================

security:

  enable_rate_limiting: true

  max_requests_per_minute: 100

  cors:

    enabled: true

    allow_origins:

      - "*"

# ==============================================================================
# Output
# ==============================================================================

output:

  save_predictions: true

  save_visualizations: true

  save_logs: true

  output_directory: outputs/
