name: ACCESS-XR Continuous Integration

on:
  push:
    branches:
      - main
      - master
      - develop

  pull_request:
    branches:
      - main
      - master

jobs:

  backend:

    name: Backend Tests

    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [3.10]

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install Dependencies
        run: |
          pip install -r backend/requirements.txt

      - name: Install Development Tools
        run: |
          pip install black flake8 pytest

      - name: Check Formatting
        run: |
          black --check backend

      - name: Lint
        run: |
          flake8 backend

      - name: Run Tests
        run: |
          pytest tests

  frontend:

    name: Frontend Build

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install

      - name: Verify Build
        run: |
          npm run lint --if-present
          npm run test --if-present

  documentation:

    name: Documentation Check

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Documentation Files

        run: |

          test -f README.md
          test -f LICENSE
          test -f CONTRIBUTING.md
          test -f CODE_OF_CONDUCT.md
          test -f SECURITY.md
          test -f CITATION.cff

          test -d docs
          test -d models
          test -d datasets

          echo "Documentation verification completed."

  repository:

    name: Repository Validation

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Repository Structure

        run: |

          test -f .gitignore
          test -f environment.yml

          test -d backend
          test -d frontend
          test -d docs
          test -d datasets
          test -d models
          test -d tests
          test -d scripts
          test -d configs

          echo "Repository structure verified."
